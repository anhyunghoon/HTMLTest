<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>라이나생명 서비스 연결 안내</title>

    <script>
        // 새로고침 중복 방지
        let isReloaded = false;

        // 앱 실행 함수
        function fnGoLDCApp() {
            const userAgent = navigator.userAgent;
            const visitTime = (new Date()).getTime();

            // iPhone
            if (/iPhone|iPad|iPod/i.test(userAgent)) {
                // 앱 미설치 시 App Store 이동
                setTimeout(function () {
                    // 아직 Safari 에 남아있으면
                    if ((new Date()).getTime() - visitTime < 3000) {
                        location.href = "https://apps.apple.com/app/id6446927821";
                    }
                }, 2500);

                // Universal Link 실행
                setTimeout(function () {
                    location.href = "https://rekindle-nag-jacket.ngrok-free.dev/applinks?url=https://m.lina.co.kr/landing/marketing/guarantee";
                }, 0);
            }
            // Android
            else if (/Android/i.test(userAgent)) {
                setTimeout(function () {
                    location.href = "market://details?id=lina.channel.ldc.app";
                }, 500);
            }
        }

        // 페이지 진입 시 실행
        window.onload = function () {
            // 자동 실행이 필요할 경우 아래 주석을 해제하세요.
            // fnGoLDCApp();
        };

        // 새로고침 함수
        function refreshPage() {
            if (isReloaded) return;
            isReloaded = true;
            console.log("페이지 새로고침");
            location.reload();
        }

        // 백그라운드 → 포그라운드 복귀 감지
        document.addEventListener("visibilitychange", function () {
            if (!document.hidden) {
                refreshPage();
            }
        });

        // Safari BFCache 대응
        window.addEventListener("pageshow", function (event) {
            if (event.persisted) {
                refreshPage();
            }
        });

        // 일부 브라우저 대응
        window.addEventListener("focus", function () {
            refreshPage();
        });
    </script>

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: #f8f9fa;
            color: #333333;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .container {
            max-width: 400px;
            width: 90%;
            background: #ffffff;
            padding: 40px 24px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
            text-align: center;
            box-sizing: border-box;
        }

        /* 라이나생명 시그니처 오렌지/블루 계열 아이콘 대용 디자인 */
        .icon-box {
            width: 64px;
            height: 64px;
            background: #e6f2ff;
            color: #007aff;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            margin: 0 auto 24px auto;
        }

        h1 {
            font-size: 22px;
            font-weight: 700;
            margin: 0 0 12px 0;
            line-height: 1.4;
            color: #111111;
        }

        p {
            font-size: 15px;
            color: #666666;
            line-height: 1.6;
            margin: 0 0 32px 0;
            word-break: keep-all;
        }

        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .button {
            display: block;
            padding: 16px;
            border-radius: 12px;
            text-decoration: none;
            font-size: 16px;
            font-weight: 600;
            transition: transform 0.1s;
            box-sizing: border-box;
        }

        .button:active {
            transform: scale(0.98);
        }

        /* iOS 스타일 버튼 */
        .btn-ios {
            background: #007aff;
            color: #ffffff;
        }
        .btn-ios:active {
            background: #0056b3;
        }

        /* Android 스타일 버튼 */
        .btn-android {
            background: #34a853;
            color: #ffffff;
        }
        .btn-android:active {
            background: #24753a;
        }

        .footer-notice {
            margin-top: 32px;
            font-size: 12px;
            color: #999999;
            line-height: 1.5;
            word-break: keep-all;
        }
    </style>
</head>

<body>

    <div class="container">
        <!-- 상단 안내 아이콘 -->
        <div class="icon-box">📱</div>

        <h1>안전한 서비스 이용을 위해<br>앱 설치가 필요합니다</h1>
        
        <p>
            요청하신 보증서 확인 및 마케팅 서비스는<br>
            <strong>라이나생명 LDC 앱</strong>에서 안전하게 제공됩니다.<br>
            아래 이용하시는 기기에 맞춰 이동해 주세요.
        </p>

        <div class="btn-group">
            <!-- iOS -->
            <a class="button btn-ios" href="https://apps.apple.com/app/id6446927821">
                iPhone / App Store 이동
            </a>

            <!-- Android -->
            <a class="button btn-android" href="market://details?id=lina.channel.ldc.app">
                Android / Google Play 이동
            </a>
        </div>

        <div class="footer-notice">
            이미 앱이 설치되어 있는 경우 자동으로 앱이 실행됩니다.<br>
            화면 이동이 멈춘 경우에만 위의 버튼을 눌러주세요.
        </div>
    </div>

</body>

</html>
