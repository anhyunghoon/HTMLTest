<!DOCTYPE html>
<html lang="ko">

<head>

    <meta charset="utf-8" />

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0" />

    <title>LINA APP LINK</title>

    <script>

        // 새로고침 중복 방지
        let isReloaded = false;

        // 앱 실행 함수
        function fnGoLDCApp() {

            const userAgent = navigator.userAgent;

            const visitTime = (new Date()).getTime();

            // iPhone
            if (/iPhone|iPad|iPod/i.test(userAgent)) {

                // 앱 미설치 시 App Store 이동
                setTimeout(function () {

                    // 아직 Safari 에 남아있으면
                    if (
                        (new Date()).getTime() - visitTime < 3000
                    ) {

                        location.href =
                            "https://apps.apple.com/app/id6446927821";
                    }

                }, 2500);

                // Universal Link 실행
                setTimeout(function () {

                    location.href =
                        "https://rekindle-nag-jacket.ngrok-free.dev/applinks?url=https://m.lina.co.kr/landing/marketing/guarantee";

                }, 0);
            }

            // Android
            else if (/Android/i.test(userAgent)) {

                setTimeout(function () {

                    location.href =
                        "market://details?id=lina.channel.ldc.app";

                }, 500);
            }
        }

        // 페이지 진입 시 실행
        window.onload = function () {

            //fnGoLDCApp();
        };

        // 새로고침 함수
        function refreshPage() {

            if (isReloaded) {
                return;
            }

            isReloaded = true;

            console.log("페이지 새로고침");

            location.reload();
        }

        // 백그라운드 → 포그라운드 복귀 감지
        document.addEventListener(
            "visibilitychange",
            function () {

                // 다시 화면이 보이면
                if (!document.hidden) {

                    refreshPage();
                }
            }
        );

        // Safari BFCache 대응
        window.addEventListener(
            "pageshow",
            function (event) {

                // 캐시 복귀
                if (event.persisted) {

                    refreshPage();
                }
            }
        );

        // 일부 브라우저 대응
        window.addEventListener(
            "focus",
            function () {

                refreshPage();
            }
        );

    </script>

    <style>

        body {
            margin: 0;
            padding: 40px;
            font-family: sans-serif;
            text-align: center;
        }

        h1 {
            margin-top: 80px;
            font-size: 28px;
        }

        p {
            margin-top: 20px;
            font-size: 16px;
            color: #666;
        }

        .button {
            display: inline-block;
            margin-top: 30px;
            padding: 14px 24px;
            border-radius: 8px;
            background: #007aff;
            color: white;
            text-decoration: none;
            font-size: 18px;
        }

    </style>

</head>

<body>

    <h1>라이나 앱 설치</h1>

    <p>
        앱 설치 후 서비스를 이용할 수 있습니다.
    </p>

    <!-- iOS -->
    <a
        class="button"
        href="https://apps.apple.com/app/id6446927821">

        App Store 이동

    </a>

    <br /><br />

    <!-- Android -->
    <a
        class="button"
        href="market://details?id=lina.channel.ldc.app">

        Play Store 이동

    </a>

</body>

</html>
