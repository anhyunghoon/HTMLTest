<!DOCTYPE html>
<html lang="ko">

<head>

    <meta charset="utf-8" />

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0" />

    <title>LINA APP LINK</title>

    <script>

        // 새로고침 중복 방지
        let isReloaded = false;

        // 앱 실행 함수
        function fnGoLDCApp1() {

            const userAgent = navigator.userAgent;

            const visitTime = (new Date()).getTime();

            // iPhone
            if (/iPhone|iPad|iPod/i.test(userAgent)) {

                // 앱 미설치 시 App Store 이동
                setTimeout(function () {

                    // 아직 Safari 에 남아있으면
                    if (
                        (new Date()).getTime() - visitTime < 3000
                    ) {

                        location.href = "https://apps.apple.com/app/id6446927821";
                    }

                }, 2500);

                // Universal Link 실행
                setTimeout(function () {

                    location.href = "ldcapp-url://qa-m.digitallina.com/landing/marketing/guarantee";

                }, 0);
            }

            // Android
            else if (/Android/i.test(userAgent)) {

                setTimeout(function () {

                    location.href =
                        "market://details?id=lina.channel.ldc.app";

                }, 500);
            }
        }

        function fnGoLDCApp(){
            var userAgent = navigator.userAgent;
            var visitTime = (new Date()).getTime();

            if(userAgent.match(/iPhone/)) { //아이폰일때
                setTimeout(function() {
                    if ((new Date()).getTime() - visitTime < 3000) {
                        location.href = "https://apps.apple.com/app/id6446927821";
                    }
                },
                2500);

                location.href = "ldcapp-url://m.lina.co.kr/landing/marketing/guarantee"

            }
            
        }

        // 페이지 진입 시 실행
        window.onload = function () {

            //fnGoLDCApp();
        };

        // 새로고침 함수
        function refreshPage() {

            if (isReloaded) {
                return;
            }

            isReloaded = true;

            console.log("페이지 새로고침");

            location.reload();
        }

        // 백그라운드 → 포그라운드 복귀 감지
        document.addEventListener(
            "visibilitychange",
            function () {

                // 다시 화면이 보이면
                if (!document.hidden) {

                    refreshPage();
                }
            }
        );

        // Safari BFCache 대응
        window.addEventListener(
            "pageshow",
            function (event) {

                // 캐시 복귀
                if (event.persisted) {

                    refreshPage();
                }
            }
        );

        // 일부 브라우저 대응
        window.addEventListener(
            "focus",
            function () {

                refreshPage();
            }
        );

    </script>

    <style>

        body {

            font-family: sans-serif;

        }

        h1 {

            padding: 14px 24px;

            background: #007aff;

            text-decoration: none;
            font-size: 18px;
        }
        
        .container {
            max-width: 400px;
            width: 90%;
            background: #ffffff;
            padding: 40px 24px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
            text-align: center;
            box-sizing: border-box;
        }

        /* 라이나생명 시그니처 오렌지/블루 계열 아이콘 대용 디자인 */
        .icon-box {
            width: 64px;
            height: 64px;
            background: #e6f2ff;
            color: #007aff;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            margin: 0 auto 24px auto;
        }
         .btn-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

    </style>

</head>

<body>

    <div class="container">
        <!-- 상단 안내 아이콘 -->
        <!-- <div class="icon-box">📱</div> -->

        <h1>안전한 서비스 이용을 위해<br>앱 설치가 필요합니다</h1>
        
        <p>
            요청하신 보증서 확인 및 마케팅 서비스는<br>
            <strong>라이나생명 LDC 앱</strong>에서 안전하게 제공됩니다.<br>
            아래 이용하시는 기기에 맞춰 이동해 주세요.
        </p>

        <div class="btn-group">
            <!-- iOS -->
            <a class="button btn-ios" href="https://apps.apple.com/app/id6446927821">
                iPhone / App Store 이동
            </a>

            <!-- Android -->
            <a class="button btn-android" href="market://details?id=lina.channel.ldc.app">
                Android / Google Play 이동
            </a>
        </div>

        <div class="footer-notice">
            이미 앱이 설치되어 있는 경우 상단 열기 버튼을 클릭하여 앱을 실행하세요.<br>
        </div>

</body>

</html>
